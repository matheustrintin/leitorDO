name: Leitor DO
on:
  schedule:
    - cron: '25 13 * * *' # 50 minutos, 12 horas (UTC) = 09:50 (Brasília)
  workflow_dispatch: # Permite rodar manualmente a qualquer momento

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Atualizado de v3 para v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Atualizado de v4 para v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python leitorDO.py
